<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>diseño · minimalista</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #faf7f5;  /* base cálido pastel */
            color: #5e5b5a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .contenedor {
            max-width: 800px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            box-shadow: 0 12px 30px rgba(210, 180, 170, 0.15);
            border: 1px solid #f0e4e0;
        }

        h1 {
            font-weight: 350;
            font-size: 3.2rem;
            letter-spacing: -0.02em;
            color: #b7a49c;        /* rosado‑terroso pastel */
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e2d6d0;
            padding-bottom: 0.75rem;
        }

        /* eliminamos el <center> anterior, lo reemplazamos con texto centrado en CSS */

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem 2.5rem;
            margin-top: 1.2rem;
            padding: 0.5rem 0;
        }

        nav a {
            text-decoration: none;
            font-weight: 400;
            font-size: 1.3rem;
            color: #9f9a97;
            background: #f2ece9;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        nav a:hover {
            background: #ffffff;
            color: #b09a91;
            border-color: #ddcec7;
            transform: scale(0.98);
            box-shadow: 0 4px 10px #ecdcd5;
        }

        /* un toque sutil: cada enlace con color de fondo pastel ligeramente distinto */
        nav a:nth-child(1) { background: #f6ede8; }  /* vainilla */
        nav a:nth-child(2) { background: #f1e9e5; }  /* arena */
        nav a:nth-child(3) { background: #efe5e0; }  /* capuchino */
        nav a:nth-child(4) { background: #f3eae4; }  /* crema */

        /* mensaje opcional de bienvenida suave */
        .mensaje-minimal {
            text-align: center;
            margin: 2.5rem 0 1rem;
            color: #b3a69f;
            font-size: 1.2rem;
            font-weight: 300;
            border-top: 1px dashed #decbc2;
            padding-top: 2rem;
        }

        .mensaje-minimal span {
            background: #f3eae7;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-size: 0.95rem;
            color: #aa948b;
            letter-spacing: 0.3px;
        }

        /* para pantallas más pequeñas */
        @media (max-width: 550px) {
            .contenedor {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2.5rem;
            }
            nav {
                gap: 1rem;
            }
            nav a {
                font-size: 1.1rem;
                padding: 0.4rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <!-- título sin etiqueta <center>, pero con estilo centrado desde CSS -->
        <h1>diseño</h1>

        <nav>
            <a href="index.html">inicio</a>
            <a href="diseño.html">diseño</a>
            <a href="info.html">informatica</a>
            <a href="turismo.html">turismo</a>
        </nav>

        <!-- pequeño detalle decorativo que mantiene el espíritu pastel/minimal -->
        <div class="mensaje-minimal">
            <span>✦  minimalismo pastel  ✦</span>
        </div>
    </div>
</body>
</html>
