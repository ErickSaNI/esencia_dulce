<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escencia Dulce · Cheesecakes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fff9f5 0%, #fef5ee 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .cheesecakes-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .cheesecakes-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .cheesecakes-header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3.8rem;
            color: #a6897a;
            text-shadow: 4px 4px 0 #fad2ba, 6px 6px 0 #f0c4aa;
            margin-bottom: 1rem;
        }

        .cheesecakes-header p {
            font-size: 1.3rem;
            color: #b39684;
            max-width: 600px;
            margin: 0 auto;
        }

        .decoracion-header {
            font-size: 3rem;
            margin-top: 1rem;
            letter-spacing: 1rem;
            opacity: 0.7;
        }

        .filtros {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .filtro-btn {
            background: #ffffff;
            border: 2px solid #f2d1c0;
            color: #a58471;
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 0 #eacab8;
        }

        .filtro-btn:hover, .filtro-btn.active {
            background: #f9ddd0;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #eacab8;
            color: #7a5b48;
        }

        .cheesecakes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
            margin-bottom: 4rem;
        }

        .cheesecake-card {
            background: #ffffff;
            border-radius: 60px 60px 50px 50px;
            overflow: hidden;
            box-shadow: 0 15px 25px -8px #ddbcab;
            border: 3px solid #f5d9cb;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cheesecake-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 35px -12px #d4b09b;
        }

        .cheesecake-imagen {
            position: relative;
            height: 260px;
            overflow: hidden;
            background: linear-gradient(135deg, #fef0e8, #fce6d9);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cheesecake-imagen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .cheesecake-card:hover .cheesecake-imagen img {
            transform: scale(1.05);
        }

        .favorito-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #f9ddd0;
            border-radius: 30px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            color: #c97e5a;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            z-index: 2;
        }

        .nuevo-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #c9a48f;
            border-radius: 30px;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: white;
            font-weight: bold;
            z-index: 2;
        }

        .cheesecake-info {
            padding: 1.8rem;
            text-align: center;
        }

        .cheesecake-nombre {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            color: #b48d78;
            margin-bottom: 0.5rem;
        }

        .cheesecake-descripcion {
            color: #9e8070;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .cheesecake-sabor {
            display: inline-block;
            background: #fff3ea;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #bb8b72;
            margin-bottom: 1rem;
            border: 1px solid #f2cfbb;
        }

        .cheesecake-precio {
            font-size: 1.8rem;
            font-weight: bold;
            color: #a5775e;
            margin: 0.8rem 0;
        }

        .cheesecake-precio span {
            font-size: 1rem;
            color: #c9a48f;
        }

        .porcion {
            font-size: 0.9rem;
            color: #c9a48f;
            margin-bottom: 0.8rem;
        }

        .btn-ordenar {
            background: #fad2ba;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #7a5b48;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-family: inherit;
            border: 2px solid #eacab8;
        }

        .btn-ordenar:hover {
            background: #f0c4aa;
            transform: scale(0.98);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 80px;
            max-width: 550px;
            width: 90%;
            padding: 2rem;
            text-align: center;
            position: relative;
            border: 4px solid #f5d9cb;
        }

        .modal-content h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: #b48d78;
            margin: 1rem 0;
        }

        .modal-imagen {
            width: 250px;
            height: 250px;
            border-radius: 40px;
            object-fit: cover;
            margin: 0 auto;
            border: 4px solid #f5d9cb;
        }

        .modal-precio {
            font-size: 2rem;
            color: #a5775e;
            margin: 1rem 0;
        }

        .cerrar-modal {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: #c9a48f;
        }

        .btn-modal {
            background: #fad2ba;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            margin-top: 1rem;
            cursor: pointer;
        }

        .caracteristicas {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed #f2d1c0;
        }

        .caracteristica {
            font-size: 0.9rem;
            color: #b39684;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .cheesecakes-header h1 {
                font-size: 2.5rem;
            }
            .cheesecakes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="cheesecakes-container">
        <div class="cheesecakes-header">
            <h1>🍰 nuestros cheesecakes 🍰</h1>
            <p>Cremosos, suaves e irresistibles. Hechos con los mejores ingredientes</p>
            <div class="decoracion-header">🍰 🧀 ✨</div>
        </div>

        <div class="cheesecakes-grid" id="cheesecakesGrid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="cerrar-modal">&times;</span>
            <img class="modal-imagen" id="modalImagen" src="" alt="">
            <h2 id="modalNombre"></h2>
            <p id="modalDescripcion"></p>
            <div class="modal-precio" id="modalPrecio"></div>
            <div class="caracteristicas">
                <span class="caracteristica">🍰 porción individual</span>
                <span class="caracteristica">🧀 queso crema premium</span>
            </div>
            <button class="btn-modal" id="modalBtn">✨ agregar al pedido ✨</button>
        </div>
    </div>

    <button onclick="window.location.href='../index.html'" style="
    background: #fad2ba;
    border: none;
    padding: 15px 30px;
    border-radius: 60px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #7a5b48;
    cursor: pointer;
    margin: 20px auto;
    display: block;
    font-family: 'Quicksand', sans-serif;
    box-shadow: 0 5px 0 #eacab8;
    transition: all 0.2s;
    text-align: center;
">
    🏠 ← Volver al Menú Principal
</button>

    <script>
        // Base de datos de Cheesecakes con IMÁGENES
        const cheesecakes = [
            {
                id: 1,
                nombre: "oreo",
                descripcion: "un increible sabor a la galleta oreo, lo sificiente para endulzar tu día",
                sabor: "galleta oreo",
                precio: 25.00,
                imagen: "../imaganes/oreo.jpeg",
                favorito: true,
                nuevo: false
            },
            {
                id: 2,
                nombre: "limón",
                descripcion: "Cheesecake sabor a limon y al mismo tiempo un sabor dulce y calido",
                sabor: "limón, clasico",
                precio: 15.00,
                imagen: "../imaganes/limon.jpg",
                favorito: true,
                nuevo: false
            }
        ];

        let filtroActual = "todos";

        function renderizarCheesecakes() {
            const grid = document.getElementById("cheesecakesGrid");
            const cheesecakesFiltrados = filtroActual === "todos" 
                ? cheesecakes 
                : cheesecakes.filter(c => c.sabor === filtroActual);
            
            grid.innerHTML = cheesecakesFiltrados.map(cheesecake => `
                <div class="cheesecake-card" data-id="${cheesecake.id}">
                    <div class="cheesecake-imagen">
                        <img src="${cheesecake.imagen}" alt="${cheesecake.nombre}">
                   
                    </div>
                    <div class="cheesecake-info">
                        <h3 class="cheesecake-nombre">${cheesecake.nombre} </h3>
                        <p class="cheesecake-descripcion">${cheesecake.descripcion}</p>
                        <span class="cheesecake-sabor">${cheesecake.sabor}</span>
                        <div class="cheesecake-precio">$${cheesecake.precio.toLocaleString()}<span> porción</span></div>
                  
                    </div>
                </div>
            `).join("");

            document.querySelectorAll(".btn-ordenar").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    const cheesecake = cheesecakes.find(c => c.id === id);
                    abrirModal(cheesecake);
                });
            });

            document.querySelectorAll(".cheesecake-card").forEach(card => {
                card.addEventListener("click", () => {
                    const id = parseInt(card.dataset.id);
                    const cheesecake = cheesecakes.find(c => c.id === id);
                    abrirModal(cheesecake);
                });
            });
        }

        const modal = document.getElementById("modal");
        const modalImagen = document.getElementById("modalImagen");
        const modalNombre = document.getElementById("modalNombre");
        const modalDescripcion = document.getElementById("modalDescripcion");
        const modalPrecio = document.getElementById("modalPrecio");

        function abrirModal(cheesecake) {
            modalImagen.src = cheesecake.imagen;
            modalNombre.textContent = `${cheesecake.nombre} ${cheesecake.emoji}`;
            modalDescripcion.textContent = cheesecake.descripcion;
            modalPrecio.textContent = `$${cheesecake.precio.toLocaleString()} porción`;
            modal.style.display = "flex";
        }

        function cerrarModal() {
            modal.style.display = "none";
        }

        document.querySelector(".cerrar-modal").addEventListener("click", cerrarModal);
        document.getElementById("modalBtn").addEventListener("click", () => {
            alert("✨ ¡Cheesecake agregado a tu pedido! ✨\nPronto nos comunicaremos contigo.");
            cerrarModal();
        });
        modal.addEventListener("click", (e) => {
            if (e.target === modal) cerrarModal();
        });

        document.querySelectorAll(".filtro-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filtro-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                filtroActual = btn.dataset.filtro;
                renderizarCheesecakes();
            });
        });

        renderizarCheesecakes();
    </script>
</body>
</html>
